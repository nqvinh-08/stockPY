services:
  app:
    build: 
      context: . #lay code tu thu muc hien tai
      dockerfile: dockerfile.app
    ports:
      - "8000:8000" #host : container
    volumes:
      - ./app:/app
    depends_on:
      - api
    environment:
      API_URL: ${API_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: always
  api:
    build:
      context: .
      dockerfile: dockerfile.api
    ports:
      - "8001:8000"
    volumes:
      - ./api:/api
    depends_on:
      - clickhouse
    environment:
      PASSCLICKHOUSE: ${PASSCLICKHOUSE}
      DATABASECLICKHOUSE: ${DATABASECLICKHOUSE}
      USERCLICKHOUSE: ${USERCLICKHOUSE}
      HOSTCLICKHOUSE: clickhouse
      PORTCLICKHOUSE: ${PORTCLICKHOUSE}
      API_URL: ${API_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: always

  clickhouse:
    image: clickhouse/clickhouse-server:latest #lay tu docker-hub
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: ${DATABASECLICKHOUSE}
      CLICKHOUSE_USER: ${USERCLICKHOUSE}
      CLICKHOUSE_PASSWORD: ${PASSCLICKHOUSE}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    restart: always
volumes:
  clickhouse_data: